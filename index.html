<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>경상북도 TRIGRS 산사태 위험 WebGIS</title>

    <!--
        Leaflet CSS
        기존 unpkg + integrity 방식 대신 jsDelivr를 사용하여
        CDN 또는 무결성 검증 문제로 지도가 비어 보이는 현상을 줄였습니다.
    -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        /* =========================================================
           1. 전체 화면
        ========================================================= */
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "Malgun Gothic", "Noto Sans KR", Arial, sans-serif;
        }

        /* =========================================================
           2. 상단 제목 및 시나리오 선택
        ========================================================= */
        #header {
            position: relative;
            z-index: 2000;

            width: 100%;
            height: 76px;
            padding: 10px 18px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            color: #ffffff;
            background: #17324d;
        }

        #header h1 {
            margin: 0 0 4px 0;
            font-size: 22px;
        }

        #header p {
            margin: 0;
            font-size: 13px;
            opacity: 0.85;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .controls label {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
        }

        #scenario-select {
            min-width: 230px;
            padding: 9px 11px;

            border: 1px solid #d0d7de;
            border-radius: 6px;

            background: #ffffff;
            font-size: 14px;
        }

        /* =========================================================
           3. 지도
        ========================================================= */
        #map {
            position: relative;
            width: 100%;
            height: calc(100% - 76px);
            background: #e8eef3;
        }

        /* Leaflet이 로드되지 않았을 때 안내문 */
        #map-error {
            display: none;
            position: absolute;
            z-index: 3000;
            left: 50%;
            top: 50%;
            width: min(520px, calc(100% - 40px));
            padding: 22px;
            transform: translate(-50%, -50%);

            color: #842029;
            background: #f8d7da;
            border: 1px solid #f5c2c7;
            border-radius: 8px;
            text-align: center;
            line-height: 1.6;
        }


        /* =========================================================
           4. 주소 및 좌표 검색 패널
        ========================================================= */
        #search-panel {
            position: absolute;
            top: 92px;
            left: 70px;
            z-index: 1500;

            width: 390px;
            padding: 13px;

            border-radius: 8px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 2px 9px rgba(0, 0, 0, 0.24);

            font-size: 13px;
        }

        .search-title {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .search-row,
        .coordinate-row {
            display: flex;
            gap: 6px;
            margin-top: 7px;
        }

        #address-input,
        #latitude-input,
        #longitude-input {
            min-width: 0;
            padding: 8px 9px;

            border: 1px solid #b8c2cc;
            border-radius: 5px;
            background: #ffffff;
            font-size: 13px;
        }

        #address-input {
            flex: 1 1 auto;
        }

        #latitude-input,
        #longitude-input {
            width: 110px;
            flex: 1 1 0;
        }

        #address-search-button,
        #coordinate-search-button {
            flex: 0 0 auto;
            padding: 8px 11px;

            color: #ffffff;
            background: #1f5f8b;
            border: 0;
            border-radius: 5px;

            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        #address-search-button:hover,
        #coordinate-search-button:hover {
            background: #174968;
        }

        #address-search-button:disabled,
        #coordinate-search-button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        #search-message {
            min-height: 20px;
            margin-top: 8px;
            color: #3d4a57;
            line-height: 1.45;
        }

        #search-message.error {
            color: #b42318;
        }

        #search-message.success {
            color: #176b3a;
        }

        .search-help {
            margin-top: 6px;
            color: #66727e;
            font-size: 11px;
            line-height: 1.45;
        }

        /* =========================================================
           5. 정보 패널 및 범례
        ========================================================= */
        #info-panel,
        #legend {
            position: absolute;
            right: 16px;
            z-index: 1500;

            width: 245px;
            padding: 13px;

            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 2px 9px rgba(0, 0, 0, 0.24);

            font-size: 13px;
            line-height: 1.65;
        }

        #info-panel {
            top: 92px;
        }

        #scenario-info {
            margin: 7px 0 0 0;
        }

        #legend {
            bottom: 24px;
        }

        #info-panel > strong,
        .legend-title {
            font-size: 14px;
            font-weight: 700;
        }

        .legend-title {
            margin-bottom: 6px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 25px;
        }

        .legend-color {
            display: inline-block;
            width: 20px;
            height: 13px;
            flex: 0 0 auto;

            border: 1px solid rgba(0, 0, 0, 0.35);
        }

        /* 안전율 4등급 */
        .fs1 {
            background: #d7191c;
        }

        .fs2 {
            background: #fdae61;
        }

        .fs3 {
            background: #a6d96a;
        }

        .fs4 {
            background: #1a9641;
        }

        /* =========================================================
           6. 스케일바 강조
        ========================================================= */
        .leaflet-control-scale {
            margin-left: 15px !important;
            margin-bottom: 18px !important;
        }

        .leaflet-control-scale-line {
            min-width: 75px;
            padding: 3px 8px 2px;

            color: #111111;
            background: rgba(255, 255, 255, 0.94);

            border: 2px solid #222222;
            border-top: none;

            font-size: 13px;
            font-weight: 700;
            line-height: 1.35;
            text-align: center;

            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
        }

        /* 확대·축소 및 레이어 버튼이 패널보다 위에 표시되도록 설정 */
        .leaflet-top,
        .leaflet-bottom {
            z-index: 1600;
        }

        /* =========================================================
           7. 모바일 화면
        ========================================================= */
        @media screen and (max-width: 720px) {
            #header {
                height: 118px;
                display: block;
                padding: 9px 12px;
            }

            #header h1 {
                font-size: 18px;
            }

            .controls {
                margin-top: 10px;
            }

            #scenario-select {
                width: 100%;
                min-width: 0;
            }

            #map {
                height: calc(100% - 118px);
            }

            #search-panel {
                top: 130px;
                left: 10px;
                right: 10px;
                width: auto;
            }

            #info-panel {
                top: 342px;
                right: 10px;
                width: 215px;
            }

            #legend {
                right: 10px;
                bottom: 18px;
                width: 180px;
            }

            .leaflet-control-scale {
                margin-left: 10px !important;
                margin-bottom: 12px !important;
            }
        }
    </style>
</head>

<body>
    <header id="header">
        <div>
            <h1>경상북도 TRIGRS 산사태 위험 WebGIS</h1>
            <p>누적강우 시나리오별 사면안전율(FS) 분석</p>
        </div>

        <div class="controls">
            <label for="scenario-select">강우 시나리오</label>

            <select id="scenario-select">
                <option value="">선택</option>
                <option value="12">12시간 / 50 mm</option>
                <option value="24">24시간 / 100 mm</option>
                <option value="36">36시간 / 150 mm</option>
                <option value="48">48시간 / 200 mm</option>
                <option value="60">60시간 / 250 mm</option>
                <option value="72">72시간 / 300 mm</option>
            </select>
        </div>
    </header>

    <main id="map">
        <div id="map-error">
            <strong>Leaflet 지도를 불러오지 못했습니다.</strong><br>
            인터넷 연결 또는 CDN 접근 상태를 확인한 후 새로고침해 주세요.
        </div>
    </main>


    <section id="search-panel">
        <div class="search-title">주소 및 좌표 검색</div>

        <div class="search-row">
            <input
                id="address-input"
                type="search"
                placeholder="예: 경상북도 예천군 감천면 포리 688"
                autocomplete="off"
                aria-label="검색할 주소"
            >
            <button id="address-search-button" type="button">
                주소검색
            </button>
        </div>

        <div class="coordinate-row">
            <input
                id="latitude-input"
                type="number"
                step="any"
                placeholder="위도 36.35"
                aria-label="위도"
            >
            <input
                id="longitude-input"
                type="number"
                step="any"
                placeholder="경도 128.75"
                aria-label="경도"
            >
            <button id="coordinate-search-button" type="button">
                좌표이동
            </button>
        </div>

        <div id="search-message">
            주소를 입력하거나 지도에서 원하는 지점을 클릭해 주세요.
        </div>

        <div class="search-help">
            좌표계: WGS84(EPSG:4326) · 위도(Y), 경도(X) 순서
        </div>
    </section>

    <section id="info-panel">
        <strong>분석정보</strong>

        <p id="scenario-info">
            Leaflet 라이브러리를 불러오는 중입니다.
        </p>
    </section>

    <section id="legend">
        <div class="legend-title">안전율 FS</div>

        <div class="legend-row">
            <span class="legend-color fs1"></span>
            <span>FS &lt; 1.0</span>
        </div>

        <div class="legend-row">
            <span class="legend-color fs2"></span>
            <span>1.0 ≤ FS &lt; 1.3</span>
        </div>

        <div class="legend-row">
            <span class="legend-color fs3"></span>
            <span>1.3 ≤ FS &lt; 1.5</span>
        </div>

        <div class="legend-row">
            <span class="legend-color fs4"></span>
            <span>FS ≥ 1.5</span>
        </div>
    </section>

    <script>
        "use strict";

        /*
         * Leaflet JavaScript를 순차적으로 불러옵니다.
         * 1순위: jsDelivr
         * 2순위: cdnjs
         * 3순위: unpkg
         *
         * 하나의 CDN이 차단되거나 응답하지 않아도 다음 주소를 시도합니다.
         */
        const leafletSources = [
            "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js",
            "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js",
            "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        ];

        function loadExternalScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.async = true;

                script.onload = () => resolve(src);
                script.onerror = () => {
                    script.remove();
                    reject(new Error(`스크립트 로드 실패: ${src}`));
                };

                document.head.appendChild(script);
            });
        }

        async function loadLeaflet() {
            for (const src of leafletSources) {
                try {
                    await loadExternalScript(src);

                    if (typeof window.L !== "undefined") {
                        console.log(`Leaflet 로드 성공: ${src}`);
                        return;
                    }
                } catch (error) {
                    console.warn(error.message);
                }
            }

            throw new Error("모든 Leaflet CDN 로드에 실패했습니다.");
        }

        function initializeWebGIS() {
            const scenarioInfo =
                document.getElementById("scenario-info");

            const searchMessage =
                document.getElementById("search-message");

            const addressInput =
                document.getElementById("address-input");

            const latitudeInput =
                document.getElementById("latitude-input");

            const longitudeInput =
                document.getElementById("longitude-input");

            const addressSearchButton =
                document.getElementById("address-search-button");

            const coordinateSearchButton =
                document.getElementById("coordinate-search-button");

            /* =====================================================
               1. 지도 생성
            ===================================================== */
            const map = L.map("map", {
                center: [36.35, 128.75],
                zoom: 8,
                minZoom: 6,
                maxZoom: 18,
                zoomControl: true,
                preferCanvas: true
            });

            /* =====================================================
               2. 배경지도
               - VWorld 일반지도
               - VWorld 영상지도
               - VWorld 영상 + 지명
               - OpenStreetMap
            ===================================================== */

            const VWORLD_API_KEY =
                "6476C315-830A-3C00-9E28-033BD2561DAF";

            /*
             * VWorld Geocoder는 브라우저에서 JSONP 방식으로 호출합니다.
             * 주소검색: ROAD 검색 후 실패하면 PARCEL을 자동 재검색합니다.
             * 좌표검색: 입력 좌표로 이동한 뒤 역지오코딩으로 주소를 표시합니다.
             */
            let searchMarker = null;

            function setSearchMessage(message, type = "") {
                searchMessage.textContent = message;
                searchMessage.className = type;
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            }

            function requestVWorldJsonp(parameters) {
                return new Promise((resolve, reject) => {
                    const callbackName =
                        `vworldCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;

                    const script =
                        document.createElement("script");

                    const timeoutId = window.setTimeout(() => {
                        cleanup();
                        reject(
                            new Error(
                                "VWorld 검색 응답 시간이 초과되었습니다."
                            )
                        );
                    }, 12000);

                    function cleanup() {
                        window.clearTimeout(timeoutId);
                        script.remove();

                        try {
                            delete window[callbackName];
                        } catch (error) {
                            window[callbackName] = undefined;
                        }
                    }

                    window[callbackName] = (result) => {
                        cleanup();
                        resolve(result);
                    };

                    script.onerror = () => {
                        cleanup();
                        reject(
                            new Error(
                                "VWorld 검색 API를 불러오지 못했습니다."
                            )
                        );
                    };

                    const query = new URLSearchParams({
                        service: "address",
                        version: "2.0",
                        format: "json",
                        errorformat: "json",
                        key: VWORLD_API_KEY,
                        callback: callbackName,
                        ...parameters
                    });

                    script.src =
                        `https://api.vworld.kr/req/address?${query.toString()}`;

                    document.head.appendChild(script);
                });
            }

            async function geocodeAddress(address, addressType) {
                return requestVWorldJsonp({
                    request: "getCoord",
                    crs: "EPSG:4326",
                    type: addressType,
                    address: address,
                    refine: "true",
                    simple: "false"
                });
            }

            async function reverseGeocode(latitude, longitude) {
                const result = await requestVWorldJsonp({
                    request: "getAddress",
                    crs: "EPSG:4326",
                    type: "BOTH",
                    point: `${longitude},${latitude}`,
                    zipcode: "true",
                    simple: "false"
                });

                const response = result?.response;

                if (response?.status !== "OK") {
                    return "";
                }

                const items = Array.isArray(response.result)
                    ? response.result
                    : [];

                const roadAddress =
                    items.find((item) => item.type === "ROAD")?.text;

                const parcelAddress =
                    items.find((item) => item.type === "PARCEL")?.text;

                return roadAddress || parcelAddress || items[0]?.text || "";
            }

            function showSearchLocation(
                latitude,
                longitude,
                title,
                description = ""
            ) {
                if (searchMarker) {
                    map.removeLayer(searchMarker);
                }

                searchMarker = L.marker(
                    [latitude, longitude],
                    {
                        title: title
                    }
                ).addTo(map);

                const popupHtml = `
                    <strong>${escapeHtml(title)}</strong><br>
                    ${description
                        ? `${escapeHtml(description)}<br>`
                        : ""}
                    위도: ${latitude.toFixed(7)}<br>
                    경도: ${longitude.toFixed(7)}
                `;

                searchMarker
                    .bindPopup(popupHtml)
                    .openPopup();

                map.setView(
                    [latitude, longitude],
                    Math.max(map.getZoom(), 16)
                );

                latitudeInput.value =
                    latitude.toFixed(7);

                longitudeInput.value =
                    longitude.toFixed(7);
            }

            async function runAddressSearch() {
                const address = addressInput.value.trim();

                if (!address) {
                    setSearchMessage(
                        "검색할 주소를 입력해 주세요.",
                        "error"
                    );
                    addressInput.focus();
                    return;
                }

                addressSearchButton.disabled = true;
                setSearchMessage(
                    "주소를 검색하는 중입니다."
                );

                try {
                    let result =
                        await geocodeAddress(address, "ROAD");

                    if (result?.response?.status !== "OK") {
                        result =
                            await geocodeAddress(address, "PARCEL");
                    }

                    const response = result?.response;

                    if (response?.status !== "OK") {
                        const errorText =
                            response?.error?.text ||
                            "검색 결과가 없습니다.";

                        throw new Error(errorText);
                    }

                    const point =
                        response.result?.point;

                    const longitude =
                        Number(point?.x);

                    const latitude =
                        Number(point?.y);

                    if (
                        !Number.isFinite(latitude) ||
                        !Number.isFinite(longitude)
                    ) {
                        throw new Error(
                            "검색 결과의 좌표가 올바르지 않습니다."
                        );
                    }

                    const refinedAddress =
                        response.refined?.text ||
                        response.input?.address ||
                        address;

                    showSearchLocation(
                        latitude,
                        longitude,
                        "주소 검색 위치",
                        refinedAddress
                    );

                    setSearchMessage(
                        `검색 완료: ${refinedAddress}`,
                        "success"
                    );
                } catch (error) {
                    console.error(error);

                    setSearchMessage(
                        `주소 검색 실패: ${error.message}`,
                        "error"
                    );
                } finally {
                    addressSearchButton.disabled = false;
                }
            }

            async function runCoordinateSearch() {
                const latitude =
                    Number(latitudeInput.value);

                const longitude =
                    Number(longitudeInput.value);

                if (
                    !Number.isFinite(latitude) ||
                    latitude < -90 ||
                    latitude > 90
                ) {
                    setSearchMessage(
                        "위도는 -90~90 범위의 숫자로 입력해 주세요.",
                        "error"
                    );
                    latitudeInput.focus();
                    return;
                }

                if (
                    !Number.isFinite(longitude) ||
                    longitude < -180 ||
                    longitude > 180
                ) {
                    setSearchMessage(
                        "경도는 -180~180 범위의 숫자로 입력해 주세요.",
                        "error"
                    );
                    longitudeInput.focus();
                    return;
                }

                coordinateSearchButton.disabled = true;
                setSearchMessage(
                    "좌표 위치와 주소를 확인하는 중입니다."
                );

                try {
                    const address =
                        await reverseGeocode(
                            latitude,
                            longitude
                        );

                    showSearchLocation(
                        latitude,
                        longitude,
                        "좌표 검색 위치",
                        address
                    );

                    setSearchMessage(
                        address
                            ? `이동 완료: ${address}`
                            : "좌표 위치로 이동했습니다.",
                        "success"
                    );
                } catch (error) {
                    console.warn(error);

                    showSearchLocation(
                        latitude,
                        longitude,
                        "좌표 검색 위치"
                    );

                    setSearchMessage(
                        "좌표 위치로 이동했지만 주소는 조회하지 못했습니다.",
                        "error"
                    );
                } finally {
                    coordinateSearchButton.disabled = false;
                }
            }

            /*
             * VWorld WMTS 공식 요청 형식
             * /{key}/{layer}/{z}/{y}/{x}.확장자
             */
            const vworldBaseLayer = L.tileLayer(
                `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Base/{z}/{y}/{x}.png`,
                {
                    minZoom: 6,
                    maxZoom: 19,
                    tileSize: 256,
                    attribution: "&copy; VWorld"
                }
            );

            const vworldSatelliteLayer = L.tileLayer(
                `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
                {
                    minZoom: 6,
                    maxZoom: 19,
                    tileSize: 256,
                    attribution: "&copy; VWorld"
                }
            );

            const vworldSatelliteForHybrid = L.tileLayer(
                `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
                {
                    minZoom: 6,
                    maxZoom: 19,
                    tileSize: 256,
                    attribution: "&copy; VWorld"
                }
            );

            const vworldHybridLabelLayer = L.tileLayer(
                `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Hybrid/{z}/{y}/{x}.png`,
                {
                    minZoom: 6,
                    maxZoom: 19,
                    tileSize: 256,
                    attribution: "&copy; VWorld"
                }
            );

            const vworldSatelliteHybridLayer = L.layerGroup([
                vworldSatelliteForHybrid,
                vworldHybridLabelLayer
            ]);

            const osmLayer = L.tileLayer(
                "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
                    maxZoom: 19,
                    attribution: "&copy; OpenStreetMap contributors"
                }
            );

            /*
             * 기본 배경지도는 VWorld 일반지도입니다.
             */
            vworldBaseLayer.addTo(map);

            L.control.layers(
                {
                    "VWorld 일반지도": vworldBaseLayer,
                    "VWorld 영상지도": vworldSatelliteLayer,
                    "VWorld 영상 + 지명": vworldSatelliteHybridLayer,
                    "OpenStreetMap": osmLayer
                },
                {},
                {
                    position: "topleft",
                    collapsed: true
                }
            ).addTo(map);


            /* =====================================================
               3. 스케일바
               - 왼쪽 아래
               - 미터 및 킬로미터만 표시
               - 마일 단위는 표시하지 않음
            ===================================================== */
            const scaleControl = L.control.scale({
                position: "bottomleft",
                metric: true,
                imperial: false,
                maxWidth: 220,
                updateWhenIdle: false
            });

            scaleControl.addTo(map);

            /* 스케일바가 DOM에 생성됐는지 확인 */
            setTimeout(() => {
                const scaleElement =
                    document.querySelector(".leaflet-control-scale");

                if (!scaleElement) {
                    console.error("스케일바 생성에 실패했습니다.");
                    scenarioInfo.innerHTML =
                        "지도는 실행되었지만 스케일바 생성에 실패했습니다.";
                }
            }, 500);

            /* =====================================================
               4. 강우 시나리오
            ===================================================== */
            const scenarios = {
                "12": {
                    duration: 12,
                    rainfall: 50
                },
                "24": {
                    duration: 24,
                    rainfall: 100
                },
                "36": {
                    duration: 36,
                    rainfall: 150
                },
                "48": {
                    duration: 48,
                    rainfall: 200
                },
                "60": {
                    duration: 60,
                    rainfall: 250
                },
                "72": {
                    duration: 72,
                    rainfall: 300
                }
            };

            const scenarioSelect =
                document.getElementById("scenario-select");

            scenarioSelect.addEventListener("change", function () {
                const scenario = scenarios[this.value];

                if (!scenario) {
                    scenarioInfo.innerHTML =
                        "강우 시나리오를 선택해 주세요.";
                    return;
                }

                scenarioInfo.innerHTML = `
                    <strong>${scenario.duration}시간 시나리오</strong><br>
                    누적강우량: ${scenario.rainfall} mm<br>
                    TRIGRS 결과 레이어는 다음 단계에서 연결합니다.
                `;
            });

            /* =====================================================
               5. 경상북도 경계 GeoJSON
               업로드 위치:
               data/boundary/gyeongbuk.geojson
               좌표계:
               EPSG:4326
            ===================================================== */
            fetch("./data/boundary/gyeongbuk.geojson")
                .then((response) => {
                    if (!response.ok) {
                        throw new Error(
                            `경북 경계 GeoJSON HTTP ${response.status}`
                        );
                    }

                    return response.json();
                })
                .then((data) => {
                    const boundaryLayer = L.geoJSON(data, {
                        style: {
                            color: "#222222",
                            weight: 2,
                            opacity: 1,
                            fillColor: "#ffffff",
                            fillOpacity: 0.04
                        },

                        onEachFeature: (feature, layer) => {
                            const properties =
                                feature.properties || {};

                            const name =
                                properties.CTP_KOR_NM ||
                                properties.name ||
                                properties.NAME ||
                                "경상북도";

                            layer.bindPopup(
                                `<strong>${name}</strong>`
                            );
                        }
                    }).addTo(map);

                    if (boundaryLayer.getBounds().isValid()) {
                        map.fitBounds(
                            boundaryLayer.getBounds(),
                            {
                                padding: [15, 15]
                            }
                        );
                    }

                    scenarioInfo.innerHTML =
                        "경상북도 경계 GeoJSON을 정상적으로 불러왔습니다.";
                })
                .catch((error) => {
                    console.info(
                        "경상북도 경계 파일은 아직 없습니다.",
                        error
                    );

                    scenarioInfo.innerHTML =
                        "VWorld 배경지도와 스케일바가 실행되었습니다.<br>" +
                        "다음 단계는 경상북도 경계 GeoJSON을 추가하는 것입니다.";
                });

            /* =====================================================
               6. 주소 및 좌표 검색 이벤트
            ===================================================== */
            addressSearchButton.addEventListener(
                "click",
                runAddressSearch
            );

            addressInput.addEventListener(
                "keydown",
                (event) => {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        runAddressSearch();
                    }
                }
            );

            coordinateSearchButton.addEventListener(
                "click",
                runCoordinateSearch
            );

            longitudeInput.addEventListener(
                "keydown",
                (event) => {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        runCoordinateSearch();
                    }
                }
            );

            /*
             * 지도를 클릭하면 해당 지점의 위도·경도를 입력창에 넣고
             * 마커와 주소를 표시합니다.
             */
            map.on("click", async (event) => {
                const latitude =
                    event.latlng.lat;

                const longitude =
                    event.latlng.lng;

                latitudeInput.value =
                    latitude.toFixed(7);

                longitudeInput.value =
                    longitude.toFixed(7);

                setSearchMessage(
                    "선택한 지점의 주소를 확인하는 중입니다."
                );

                try {
                    const address =
                        await reverseGeocode(
                            latitude,
                            longitude
                        );

                    showSearchLocation(
                        latitude,
                        longitude,
                        "지도 선택 위치",
                        address
                    );

                    setSearchMessage(
                        address
                            ? `선택 위치: ${address}`
                            : "선택한 지점의 좌표를 입력했습니다.",
                        "success"
                    );
                } catch (error) {
                    console.warn(error);

                    showSearchLocation(
                        latitude,
                        longitude,
                        "지도 선택 위치"
                    );

                    setSearchMessage(
                        "선택한 지점의 좌표를 입력했습니다.",
                        "success"
                    );
                }
            });

            /* =====================================================
               7. 지도 크기 재계산
            ===================================================== */
            window.addEventListener("resize", () => {
                map.invalidateSize();
            });

            setTimeout(() => {
                map.invalidateSize();
            }, 300);
        }

        loadLeaflet()
            .then(() => {
                initializeWebGIS();
            })
            .catch((error) => {
                console.error(error);

                document.getElementById("map-error").style.display =
                    "block";

                document.getElementById("scenario-info").innerHTML =
                    "Leaflet 라이브러리를 불러오지 못했습니다.<br>" +
                    "인터넷 연결 또는 CDN 접근 상태를 확인해 주세요.";
            });
    </script>
</body>
</html>
